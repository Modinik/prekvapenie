<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VЕЎetko najlepЕЎie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .container {
            padding: 60px 100px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.2s ease-out;
            max-width: 900px;
            width: 85%;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 25px;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
        }

        p {
            font-size: 2rem;
            line-height: 1.5;
            font-weight: 300;
            color: #e0e0e0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            animation: fall 2.5s forwards ease-in;
            z-index: 100;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 1rem;
            color: #ff4d6d;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VЕЎetko najlepЕЎie, tatik! рџЋ‚</h1>
        <p>Prajem Ti veДѕa zdravia, ЕЎЕҐastia, pohody a aby si nechodil rГЅchlo. <br>
        Si ten najlepЕЎГ­ tatik na svete!</p>
    </div>

    <div class="hint">Klikaj na obrazovku pre ДЏalЕЎie prekvapenia! вњЁ</div>

    <script>
        // 1. EFEKT PRI KLIKNUTГЌ (Konfety + PadajГєce Emoji)
        document.addEventListener('click', function(e) {
            confetti({
                particleCount: 40,
                spread: 70,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: ['#ff4d6d', '#4cc9f0', '#ffbe0b', '#ffffff']
            });

            const emojis = ['рџЋ‰', 'рџЋ‚', 'рџЋ€', 'рџЋЉ', 'рџЏЋпёЏ', 'вњЁ'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = e.clientX + 'px';
            emojiEl.style.top = e.clientY + 'px';
            
            document.body.appendChild(emojiEl);

            setTimeout(() => { emojiEl.remove(); }, 2500);
        });

        // 2. DLHЕ ГЌ A NГЃHODNГќ NARODENINOVГќ Е TART
        window.onload = function() {
            var duration = 5 * 1000; // 5 sekГєnd ЕЎialenstva
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // StrieДѕame z nГЎhodnГЅch miest na stranГЎch
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
                
                // ObДЌasnГЅ vГЅstrel zdola v strede
                if (Math.random() > 0.7) {
                    confetti({
                        particleCount: 20,
                        spread: 60,
                        origin: { x: 0.5, y: 0.8 },
                        colors: ['#ff4d6d']
                    });
                }
            }, 250);
        };
    </script>
</body>
</html>
