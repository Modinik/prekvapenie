<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            position: relative;
            cursor: pointer; /* Naznačíme, že sa dá klikať */
        }

        /* Dekoratívne vlnovky a čiary na pozadí */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }

        .line {
            position: absolute;
            border: 2px solid #e94560;
            border-radius: 50%;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 50px) rotate(20deg); }
        }

        .container {
            padding: 50px 80px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        inset 0 0 15px rgba(233, 69, 96, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease-out;
            max-width: 800px;
            width: 85%;
            user-select: none; /* Aby sa text pri klikaní neoznačoval */
        }

        h1 {
            font-size: 3.8rem;
            margin-bottom: 20px;
            color: #e94560;
            text-shadow: 2px 2px 10px rgba(233, 69, 96, 0.5);
        }

        p {
            font-size: 1.8rem;
            line-height: 1.6;
            font-weight: 300;
        }

        @keyframes fadeIn {
            from { opacity: 0; scale: 0.9; }
            to { opacity: 1; scale: 1; }
        }

        /* Tip pre otca */
        .click-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="bg-decoration">
        <div class="line" style="width: 400px; height: 150px; top: 5%; left: -100px; border-radius: 30% 70% 70% 30%;"></div>
        <div class="line" style="width: 300px; height: 200px; bottom: 10%; right: -50px; border-color: #4ecca3; opacity: 0.4;"></div>
        <div class="line" style="width: 150px; height: 150px; top: 50%; left: 5%; border-width: 1px; border-style: dashed; opacity: 0.2;"></div>
    </div>

    <div class="container">
        <h1>Všetko najlepšie, tatik! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </div>

    <div class="click-hint">Skús klikať myškou po obrazovke! ✨</div>

    <script>
        // Funkcia pre výbuch na mieste kliknutia
        document.addEventListener('click', function(e) {
            var scalar = 2;
            var party = confetti.shapeFromText({ text: '🎉', scalar });

            confetti({
                shapes: [party, 'circle', 'square'],
                particleCount: 40,
                spread: 70,
                origin: {
                    x: e.clientX / window.innerWidth,
                    y: e.clientY / window.innerHeight
                },
                colors: ['#e94560', '#4ecca3', '#ffffff', '#ffbe0b']
            });
        });

        // Automatický štart po načítaní
        window.onload = function() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                confetti({
                    particleCount: 20,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#e94560', '#ffffff']
                });
                confetti({
                    particleCount: 20,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#4ecca3', '#ffffff']
                });
            }, 400);
        };
    </script>
</body>
</html>
