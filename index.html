<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, Rado Van Gajdoš!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0b14;
            background: radial-gradient(circle at top, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* Moderný čistý banner */
        .header-banner {
            width: 100%;
            padding: 80px 20px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2.2rem, 10vw, 4rem);
            color: #ff4d6d;
            margin: 0 0 20px 0;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
        }

        p {
            font-size: clamp(1.1rem, 5vw, 1.8rem);
            max-width: 700px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            font-weight: 300;
        }

        /* Nové usporiadanie galérie */
        .gallery-wrap {
            max-width: 1200px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 350px; /* Jednotná výška pre čistý vzhľad */
            gap: 30px;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s scale;
        }

        /* Efekt pri prejdení myšou */
        .photo-item:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            border-color: rgba(255, 77, 109, 0.5);
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        .hint-text {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #ff4d6d;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        canvas {
            position: fixed !important;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999 !important;
            pointer-events: none;
        }

        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 3rem;
            animation: fall 3s forwards ease-in;
            z-index: 10000;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Responzivita pre mobil */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr; /* Na mobile jedna pod druhou */
                grid-auto-rows: 300px;
                gap: 20px;
            }
            .header-banner { padding: 50px 15px; }
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <h1>Všetko najlepšie,<br>Rado Van Gajdoš! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby sa ti darilo s Nelou, a taktiež aj na DHZ, a aby si s nami vždy vyhrával.</p>
    </header>

    <div class="hint-text">Skús klikať pre prekvapenie ✨</div>

    <div class="gallery-wrap">
        <div class="gallery-grid">
            <div class="photo-item"><img src="foto1.jpg" alt="Foto 1"></div>
            <div class="photo-item"><img src="foto2.jpg" alt="Foto 2"></div>
            <div class="photo-item"><img src="foto3.jpeg" alt="Foto 3"></div>
            <div class="photo-item"><img src="foto4.jpg" alt="Foto 4"></div>
        </div>
    </div>

    <script>
        const myConfetti = confetti.create(undefined, { resize: true, useWorker: true });

        function triggerEffect(x, y, pageY) {
            myConfetti({
                particleCount: 40,
                spread: 70,
                origin: { x: x / window.innerWidth, y: y / window.innerHeight },
                zIndex: 9999
            });

            const emojis = ['🎉', '🎂', '🎈', '🏎️', '✨'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = x + 'px';
            emojiEl.style.top = pageY + 'px';
            document.body.appendChild(emojiEl);
            setTimeout(() => { emojiEl.remove(); }, 3000);
        }

        document.addEventListener('mousedown', (e) => triggerEffect(e.clientX, e.clientY, e.pageY));
        document.addEventListener('touchstart', (e) => {
            triggerEffect(e.touches[0].clientX, e.touches[0].clientY, e.touches[0].pageY);
        });

        window.onload = function() {
            myConfetti({ particleCount: 150, spread: 70, origin: { y: 0.3 }, zIndex: 9999 });
            var duration = 3000;
            var end = Date.now() + duration;
            var interval = setInterval(function() {
                if (Date.now() > end) return clearInterval(interval);
                myConfetti({
                    particleCount: 20,
                    startVelocity: 30,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.1 },
                    zIndex: 9999
                });
            }, 150);
        };
    </script>
</body>
</html>
