<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, Rado Van Gajdoš!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0b14;
            background: radial-gradient(circle at top, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden; /* Zákaz bočného posúvania */
            cursor: pointer;
        }

        /* Banner na vrchu */
        .header-banner {
            width: 100%;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #ff4d6d;
            margin: 0 0 15px 0;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }

        p {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            max-width: 800px;
            margin: 0 auto;
            color: #f0f0f0;
            line-height: 1.4;
        }

        /* Sekcia galérie */
        .gallery-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            /* Automatické stĺpce podľa šírky displeja */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            justify-items: center;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            display: block;
        }

        .hint-bar {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #ff4d6d;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        canvas {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999 !important;
            pointer-events: none;
        }

        /* Padajúce emoji pri kliknutí */
        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            animation: fall 2.5s forwards ease-in;
            z-index: 10000;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <h1>Všetko najlepšie, Rado Van Gajdoš! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </header>

    <div class="hint-bar">Klikaj na obrazovku pre efekty ✨</div>

    <div class="gallery-container">
        <div class="photo-card"><img src="foto1.jpg" alt="Spomienka 1"></div>
        <div class="photo-card"><img src="foto2.jpg" alt="Spomienka 2"></div>
        <div class="photo-card"><img src="foto3.jpg" alt="Spomienka 3"></div>
        <div class="photo-card"><img src="foto4.jpg" alt="Spomienka 4"></div>
        </div>

    <script>
        const myConfetti = confetti.create(undefined, { resize: true, useWorker: true });

        function triggerEffect(x, y, pageY) {
            myConfetti({
                particleCount: 40,
                spread: 70,
                origin: { x: x / window.innerWidth, y: y / window.innerHeight },
                zIndex: 9999
            });

            const emojis = ['🎉', '🎂', '🎈', '🏎️', '✨'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            // Použijeme pageY, aby emoji padalo z miesta, kde si práve odscrollovaný
            emojiEl.style.left = x + 'px';
            emojiEl.style.top = pageY + 'px';
            document.body.appendChild(emojiEl);
            setTimeout(() => { emojiEl.remove(); }, 2500);
        }

        document.addEventListener('mousedown', (e) => triggerEffect(e.clientX, e.clientY, e.pageY));
        document.addEventListener('touchstart', (e) => {
            triggerEffect(e.touches[0].clientX, e.touches[0].clientY, e.touches[0].pageY);
        });

        window.onload = function() {
            // Úvodný ohňostroj na banneri
            myConfetti({ particleCount: 150, spread: 70, origin: { y: 0.3 }, zIndex: 9999 });
            
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            var interval = setInterval(function() {
                if (Date.now() > end) return clearInterval(interval);
                myConfetti({
                    particleCount: 20,
                    startVelocity: 30,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.1 },
                    zIndex: 9999
                });
            }, 150);
        };
    </script>
</body>
</html>
