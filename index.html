<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center; /* Návrat na stred */
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
        }

        .container {
            padding: 50px 70px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease-out;
            max-width: 850px;
            width: 85%;
            z-index: 1; /* Pod konfetami */
            position: relative;
            user-select: none;
        }

        /* Konfety a emoji musia byť NAD kontajnerom */
        canvas {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100 !important; 
            pointer-events: none;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ff4d6d;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
        }

        p {
            font-size: 1.8rem;
            line-height: 1.5;
            color: #f0f0f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 2.8rem;
            animation: fall 3s forwards ease-in;
            z-index: 101; /* Emoji nad všetkým */
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Všetko najlepšie, tatik! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </div>

    <script>
        const myConfetti = confetti.create(undefined, { resize: true, useWorker: true });

        // Klikacia interakcia
        document.addEventListener('click', function(e) {
            myConfetti({
                particleCount: 50,
                spread: 80,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                zIndex: 200
            });

            const emojis = ['🎉', '🎂', '🎈', '🎊', '🏎️', '🍾'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = e.clientX + 'px';
            emojiEl.style.top = e.clientY + 'px';
            document.body.appendChild(emojiEl);
            setTimeout(() => { emojiEl.remove(); }, 3000);
        });

        // ÚPLNE RANDOM ŠTART KONFIET
        window.onload = function() {
            var duration = 7 * 1000; // 7 sekúnd random výbuchov
            var end = Date.now() + duration;

            var interval = setInterval(function() {
                if (Date.now() > end) return clearInterval(interval);

                // Strieľa z náhodných súradníc (X aj Y sú random)
                myConfetti({
                    particleCount: 15,
                    startVelocity: 30,
                    spread: 360,
                    ticks: 60,
                    origin: { 
                        x: Math.random(), 
                        y: Math.random() - 0.2 // Trochu vyššie, aby to padalo dole
                    },
                    zIndex: 200,
                    colors: ['#ff4d6d', '#4cc9f0', '#ffbe0b', '#ffffff', '#7209b7']
                });
            }, 200);

            // Jeden veľký finálny výbuch zo stredu po 1 sekunde
            setTimeout(() => {
                myConfetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.5 },
                    zIndex: 200
                });
            }, 1000);
        };
    </script>
</body>
</html>
