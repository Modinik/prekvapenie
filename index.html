<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .container {
            padding: 60px 100px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.2s ease-out;
            max-width: 900px;
            width: 85%;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 25px;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
        }

        p {
            font-size: 2rem;
            line-height: 1.5;
            font-weight: 300;
            color: #e0e0e0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Štýl pre padajúce emoji pri kliknutí */
        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            animation: fall 2s forwards ease-in;
            z-index: 100;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(500px) rotate(360deg); opacity: 0; }
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 1rem;
            color: #ff4d6d;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Všetko najlepšie, tatik! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </div>

    <div class="hint">Klikaj kdekoľvek pre prekvapenie ✨</div>

    <script>
        // Funkcia pre efekty pri kliknutí
        document.addEventListener('click', function(e) {
            // 1. Klasické konfety z miesta kliku
            confetti({
                particleCount: 30,
                spread: 60,
                origin: {
                    x: e.clientX / window.innerWidth,
                    y: e.clientY / window.innerHeight
                },
                colors: ['#ff4d6d', '#ffffff', '#ffbe0b']
            });

            // 2. Ručne vytvorené padajúce emoji
            const emojis = ['🎉', '🎂', '🎈', '🎊'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = e.clientX + 'px';
            emojiEl.style.top = e.clientY + 'px';
            
            document.body.appendChild(emojiEl);

            // Odstránenie emoji po animácii
            setTimeout(() => {
                emojiEl.remove();
            }, 2000);
        });

        // Automatický ohňostroj na začiatku
        window.onload = function() {
            const count = 200;
            const defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        };
    </script>
</body>
</html>
