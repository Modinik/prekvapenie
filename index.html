<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Všetko najlepšie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Posunie tabuľku na spodok */
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            padding-bottom: 50px; /* Medzera od úplného spodku */
        }

        .container {
            padding: 40px 60px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1.2s ease-out;
            max-width: 800px;
            width: 85%;
            z-index: 1; /* Tabuľka bude nižšie */
            position: relative;
        }

        /* Toto zabezpečí, že konfety budú NAD všetkým */
        canvas {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999 !important; /* Najvyššia vrstva */
            pointer-events: none; /* Aby sa dalo klikať "cez" konfety */
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            color: #ff4d6d;
        }

        p {
            font-size: 1.6rem;
            line-height: 1.4;
            color: #e0e0e0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            animation: fall 2.5s forwards ease-in;
            z-index: 10000; /* Emoji tiež nad tabuľkou */
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Všetko najlepšie, tatik! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </div>

    <script>
        // Nastavenie konfiet tak, aby boli vždy navrchu
        const myConfetti = confetti.create(undefined, {
            resize: true,
            useWorker: true
        });

        document.addEventListener('click', function(e) {
            myConfetti({
                particleCount: 40,
                spread: 70,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                zIndex: 9999 // Explicitne navrchu
            });

            const emojis = ['🎉', '🎂', '🎈', '🎊', '🏎️'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = e.clientX + 'px';
            emojiEl.style.top = e.clientY + 'px';
            document.body.appendChild(emojiEl);
            setTimeout(() => { emojiEl.remove(); }, 2500);
        });

        window.onload = function() {
            var duration = 6 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                myConfetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    zIndex: 9999
                });
                myConfetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    zIndex: 9999
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
            
            // Náhodné výbuchy zhora
            var interval = setInterval(function() {
                if (Date.now() > end) return clearInterval(interval);
                myConfetti({
                    particleCount: 10,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    zIndex: 9999
                });
            }, 300);
        };
    </script>
</body>
</html>
