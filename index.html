<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Všetko najlepšie, tatik!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0b0b14 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            /* Zabraňuje nechcenému zoomovaniu na mobile pri klikaní */
            touch-action: manipulation;
        }

        .container {
            padding: 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Pre Safari na iPhone */
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.2s ease-out;
            max-width: 90%; /* Prispôsobenie šírky mobilu */
            width: 800px;
            z-index: 1; 
            position: relative;
            user-select: none;
        }

        canvas {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100 !important; 
            pointer-events: none;
        }

        /* Dynamická veľkosť písma podľa zariadenia */
        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 15px;
            color: #ff4d6d;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
        }

        p {
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            line-height: 1.4;
            color: #f0f0f0;
        }

        .click-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: #ff4d6d;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.6;
            animation: pulse 2s infinite ease-in-out;
            width: 100%;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji-click {
            position: absolute;
            pointer-events: none;
            font-size: clamp(1.5rem, 6vw, 2.8rem);
            animation: fall 2.5s forwards ease-in;
            z-index: 101;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Všetko najlepšie, tatik! 🎂</h1>
        <p>Prajem Ti veľa zdravia, šťastia, pohody a aby si nechodil rýchlo. <br>
        Si ten najlepší tatik na svete!</p>
    </div>

    <div class="click-hint">Ťukni na displej pre prekvapenie ✨</div>

    <script>
        const myConfetti = confetti.create(undefined, { resize: true, useWorker: true });

        // Funkcia pre efekty (funguje na klik aj dotyk)
        function triggerEffect(x, y) {
            myConfetti({
                particleCount: window.innerWidth < 600 ? 25 : 50, // Na mobile menej častíc, aby nesekalo
                spread: 70,
                origin: { x: x / window.innerWidth, y: y / window.innerHeight },
                zIndex: 200
            });

            const emojis = ['🎉', '🎂', '🎈', '🎊', '🎁', '🥂', '🍾', '🍺'];
            const emojiEl = document.createElement('div');
            emojiEl.className = 'emoji-click';
            emojiEl.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = x + 'px';
            emojiEl.style.top = y + 'px';
            document.body.appendChild(emojiEl);
            setTimeout(() => { emojiEl.remove(); }, 2500);
        }

        document.addEventListener('mousedown', (e) => triggerEffect(e.clientX, e.clientY));
        // Pridaná podpora pre dotykové displeje
        document.addEventListener('touchstart', (e) => {
            triggerEffect(e.touches[0].clientX, e.touches[0].clientY);
        });

        window.onload = function() {
            const isMobile = window.innerWidth < 600;
            
            // Úvodné výbuchy prispôsobené obrazovke
            myConfetti({ particleCount: isMobile ? 80 : 150, spread: 70, origin: { x: 0.1, y: 0.5 }, zIndex: 200 });
            myConfetti({ particleCount: isMobile ? 80 : 150, spread: 70, origin: { x: 0.9, y: 0.5 }, zIndex: 200 });

            var duration = 3 * 1000; 
            var end = Date.now() + duration;

            var interval = setInterval(function() {
                if (Date.now() > end) return clearInterval(interval);

                myConfetti({
                    particleCount: isMobile ? 10 : 25, 
                    startVelocity: isMobile ? 25 : 40,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    zIndex: 200
                });
            }, isMobile ? 200 : 100);
        };
    </script>
</body>
</html>
